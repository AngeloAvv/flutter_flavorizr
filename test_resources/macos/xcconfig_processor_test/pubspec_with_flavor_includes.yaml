name: flutterflavorizr_example
description: Demonstrates how to use the flutterflavorizr plugin.
publish_to: 'none'

environment:
  sdk: ">=2.1.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_flavorizr:
    path: ../


flavorizr:
  flavors:
    apple:
      app:
        name: "Apple App"

      macos:
        bundleId: "com.example.apple"
        includes:
          - value: "Apple/flavor.xcconfig"
          - value: "Apple/debug-flavor.xcconfig"
            target: debug


flutter:
  uses-material-design: true
