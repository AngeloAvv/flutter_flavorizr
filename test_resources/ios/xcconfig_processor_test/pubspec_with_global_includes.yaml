name: flutterflavorizr_example
description: Demonstrates how to use the flutterflavorizr plugin.
publish_to: 'none'

environment:
  sdk: ">=2.1.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_flavorizr:
    path: ../


flavorizr:
  app:
    android:
      flavorDimensions: "flavor-type"
    ios:
      includes:
        - value: "Shared/base.xcconfig"
        - value: "Shared/debug.xcconfig"
          target: debug

  flavors:
    apple:
      app:
        name: "Apple App"

      android:
        applicationId: "com.example.apple"

      ios:
        bundleId: "com.example.apple"


flutter:
  uses-material-design: true
